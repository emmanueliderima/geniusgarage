services:
  web:
    container_name: my-next-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm-store:/pnpm/store
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    command: pnpm dev
    stdin_open: true
    tty: true

volumes:
  node_modules:
  pnpm-store: